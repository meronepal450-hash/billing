<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <title>AR Bibidh Sewa - Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4" style="background: url('login-bg.png') center/cover;">
        <div class="bg-white/90 p-8 rounded-2xl shadow-2xl w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center text-blue-800 mb-6">AR Bibidh Sewa लगइन</h2>
            <input type="text" id="user" placeholder="Username" class="w-full border p-3 rounded-xl mb-3 outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full border p-3 rounded-xl mb-3 outline-none">
            <button onclick="checkLogin()" class="w-full bg-blue-700 text-white font-bold py-3 rounded-xl hover:bg-blue-800 transition">प्रवेश गर्नुहोस्</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="app-screen" class="hidden min-h-screen bg-gray-100 p-4">
        <header class="bg-blue-800 text-white p-4 rounded-xl flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <img src="ChatGPT Image Jun 28, 2026, 02_49_58 PM.png" class="w-12 h-12 rounded-full">
                <h1 class="font-bold text-lg">AR Bibidh Sewa</h1>
            </div>
            <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-sm font-bold">Logout</button>
        </header>

        <!-- Income Summary -->
        <div class="bg-white p-4 rounded-xl shadow mb-6">
            <h2 class="font-bold text-blue-800 mb-2">📊 Income Summary</h2>
            <div class="flex gap-2">
                <button onclick="filterIncome('daily')" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">Daily</button>
                <button onclick="filterIncome('weekly')" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">Weekly</button>
                <button onclick="filterIncome('monthly')" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">Monthly</button>
            </div>
            <p id="total-income" class="text-xl font-bold mt-2">Total: रू. 0</p>
        </div>

        <!-- Billing Form -->
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <input type="text" id="cust" placeholder="ग्राहकको नाम" class="w-full border p-2 mb-2 rounded">
            <select id="item-list" onchange="calc()" class="w-full border p-2 mb-2 rounded">
                <option value="Photocopy" data-price="10">Photocopy (रू. 10)</option>
                <option value="P.P Photo 6" data-price="150">P.P Photo 6 (रू. 150)</option>
                <option value="Nibedan" data-price="40">Nibedan (रू. 40)</option>
            </select>
            <input type="number" id="qty" value="1" oninput="calc()" class="w-full border p-2 mb-2 rounded" placeholder="Quantity">
            <input type="number" id="amt" readonly class="w-full border p-2 mb-2 rounded bg-gray-100">
            <select id="status" class="w-full border p-2 mb-4 rounded"><option value="Paid">Paid</option><option value="Due">उधार (Due)</option></select>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="location.reload()" class="bg-gray-500 text-white py-2 rounded">New</button>
                <button onclick="saveBill()" class="bg-green-600 text-white py-2 rounded">Save</button>
                <button onclick="window.print()" class="bg-blue-600 text-white py-2 rounded">Print</button>
            </div>
        </div>

        <!-- History -->
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="font-bold mb-4">📜 बिल इतिहास</h2>
            <div id="history-list" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://kmceruxlxyjzisgklpdq.supabase.co", "sb_publishable_YoAUip8_m33tXwLQ5X-fnw_W4yNxSMg");
        
        function checkLogin() {
            if(document.getElementById('user').value === "Pintu@12" && document.getElementById('pass').value === "157359") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                fetchHistory();
            } else alert('गलत प्रयोगकर्ता नाम वा पासवर्ड!');
        }

        async function fetchHistory() {
            const { data } = await _supabase.from('billing_entries').select('*').order('created_at', { ascending: false });
            document.getElementById('history-list').innerHTML = data.map(b => `
                <div class="border-b pb-2 flex justify-between text-sm">
                    <span>${b.customer_name} (${b.status})</span>
                    <span class="font-bold">रू. ${b.bill_amount}</span>
                </div>`).join('');
        }

        async function saveBill() {
            await _supabase.from('billing_entries').insert([{
                customer_name: document.getElementById('cust').value,
                item_name: document.getElementById('item-list').value,
                bill_amount: document.getElementById('amt').value,
                status: document.getElementById('status').value
            }]);
            fetchHistory();
        }

        function calc() {
            const item = document.getElementById('item-list');
            document.getElementById('amt').value = item.options[item.selectedIndex].dataset.price * document.getElementById('qty').value;
        }

        function logout() { location.reload(); }
        calc();
    </script>
</body>
</html>
