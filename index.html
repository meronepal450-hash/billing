<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Bibidh Sewa - Online System</title>
    <!-- CDN Links for Supabase, Tailwind, FontAwesome -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700&display=swap');
        body { font-family: 'Mukta', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-12">

    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-wide">AR Bibidh Sewa</h1>
                <p class="text-xs text-blue-200">ए.आर. बिबिध सेवा (अनलाइन प्रणाली)</p>
            </div>
            <div id="sync-status" class="bg-blue-700 text-xs px-3 py-1 rounded-full flex items-center gap-2">
                <i class="fas fa-cloud-check text-green-400"></i> अनलाइन सिंक सक्रिय
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-4xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Section 1: Billing Form & History -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                <i class="fas fa-calculator text-blue-600"></i> बिलिङ प्रणाली (Billing)
            </h2>
            
            <form id="billing-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">ग्राहकको नाम (Customer Name)</label>
                    <input type="text" id="cust-name" required class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">कुल रकम (Total Amount - रू.)</label>
                    <input type="number" id="bill-amt" required class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition shadow">
                    डेटा सुरक्षित गर्नुहोस (Save Bill)
                </button>
            </form>

            <div class="mt-6">
                <h3 class="text-md font-bold text-gray-700 mb-2">हालैका बिलहरू (Recent Bills)</h3>
                <div id="billing-list" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                    <p class="text-sm text-gray-400 italic">लोड हुँदैछ...</p>
                </div>
            </div>
        </section>

        <!-- Section 2: Portfolio & Services -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                <i class="fas fa-images text-orange-600"></i> मेरो पोर्टफोलियो (My Portfolio)
            </h2>

            <form id="portfolio-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">सेवा/शीर्षक (Service Title)</label>
                    <input type="text" id="port-title" required class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="उदा: पासपोर्ट साइज फोटो">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">विवरण (Description)</label>
                    <textarea id="port-desc" class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-orange-500 outline-none h-20" placeholder="थप जानकारी यहाँ लेख्नुहोस्..."></textarea>
                </div>
                <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 rounded-lg transition shadow">
                    पोर्टफोलियोमा थप्नुहोस् (Add to Portfolio)
                </button>
            </form>

            <div class="mt-6">
                <h3 class="text-md font-bold text-gray-700 mb-2">थपिएका सेवाहरू (Portfolio Items)</h3>
                <div id="portfolio-list" class="grid grid-cols-1 gap-3 max-h-60 overflow-y-auto pr-1">
                    <p class="text-sm text-gray-400 italic">लोड हुँदैछ...</p>
                </div>
            </div>
        </section>

    </main>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = "https://kmceruxlxyjzisgklpdq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_YoAUip8_m33tXwLQ5X-fnw_W4yNxSMg";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Detect device info
        const deviceType = /Mobi|Android|iPhone/i.test(navigator.userAgent) ? 'Mobile' : 'Computer';

        // Load Data on Startup
        window.addEventListener('DOMContentLoaded', () => {
            fetchBills();
            fetchPortfolio();
        });

        // 1. BILLING LOGIC
        async function fetchBills() {
            const listDiv = document.getElementById('billing-list');
            const { data, error } = await _supabase
                .from('billing_entries')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                listDiv.innerHTML = `<p class="text-red-500 text-xs">त्रुटि: लोड गर्न सकिएन</p>`;
                return;
            }

            if (data.length === 0) {
                listDiv.innerHTML = `<p class="text-sm text-gray-400 italic">कुनै रेकर्ड भेटिएन</p>`;
                return;
            }

            listDiv.innerHTML = data.map(bill => `
                <div class="bg-gray-50 p-3 rounded-lg border flex justify-between items-center text-sm">
                    <div>
                        <p class="font-bold text-gray-800">${bill.customer_name}</p>
                        <p class="text-xs text-gray-400">${new Date(bill.created_at).toLocaleString('ne-NP')}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-blue-600">रू. ${bill.bill_amount}</p>
                        <span class="text-[10px] bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded">${bill.device_type || 'Unknown'}</span>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('billing-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('sync-status');
            statusDiv.innerHTML = `<i class="fas fa-spinner fa-spin text-yellow-400"></i> सुरक्षित गरिँदैछ...`;

            const name = document.getElementById('cust-name').value;
            const amount = document.getElementById('bill-amt').value;

            const { error } = await _supabase
                .from('billing_entries')
                .insert([{ customer_name: name, bill_amount: parseFloat(amount), device_type: deviceType }]);

            if (error) {
                alert('सुरक्षित गर्न सकिएन, कृपया पुन: प्रयास गर्नुहोस्।');
            } else {
                document.getElementById('billing-form').reset();
                await fetchBills();
            }
            statusDiv.innerHTML = `<i class="fas fa-cloud-check text-green-400"></i> अनलाइन सिंक सक्रिय`;
        });

        // 2. PORTFOLIO LOGIC
        async function fetchPortfolio() {
            const portDiv = document.getElementById('portfolio-list');
            const { data, error } = await _supabase
                .from('portfolio_entries')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                portDiv.innerHTML = `<p class="text-red-500 text-xs">त्रुटि: लोड गर्न सकिएन</p>`;
                return;
            }

            if (data.length === 0) {
                portDiv.innerHTML = `<p class="text-sm text-gray-400 italic">कुनै पोर्टफोलियो भेटिएन</p>`;
                return;
            }

            portDiv.innerHTML = data.map(item => `
                <div class="bg-orange-50/50 p-3 rounded-lg border border-orange-100">
                    <h4 class="font-bold text-gray-800">${item.title}</h4>
                    <p class="text-xs text-gray-600 mt-1">${item.description || 'विवरण उपलब्ध छैन'}</p>
                </div>
            `).join('');
        }

        document.getElementById('portfolio-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('sync-status');
            statusDiv.innerHTML = `<i class="fas fa-spinner fa-spin text-yellow-400"></i> सुरक्षित गरिँदैछ...`;

            const title = document.getElementById('port-title').value;
            const desc = document.getElementById('port-desc').value;

            const { error } = await _supabase
                .from('portfolio_entries')
                .insert([{ title: title, description: desc }]);

            if (error) {
                alert('पोर्टफोलियो थप्न सकिएन।');
            } else {
                document.getElementById('portfolio-form').reset();
                await fetchPortfolio();
            }
            statusDiv.innerHTML = `<i class="fas fa-cloud-check text-green-400"></i> अनलाइन सिंक सक्रिय`;
        });
    </script>
</body>
</html>
