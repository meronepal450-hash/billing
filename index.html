<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <title>AR Bibidh Sewa - Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div id="app" class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="bg-blue-800 text-white p-4 rounded-xl flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <img src="ChatGPT Image Jun 28, 2026, 02_49_58 PM.png" class="w-12 h-12 rounded-full">
                <div>
                    <h1 class="text-xl font-bold">AR Bibidh Sewa</h1>
                    <p class="text-xs" id="date-display"></p>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-sm">Logout</button>
        </header>

        <!-- Income Tabs -->
        <div class="bg-white p-4 rounded-xl shadow mb-6">
            <h2 class="font-bold mb-2 text-blue-800">📊 Income Summary</h2>
            <div class="flex gap-2 mb-3">
                <button onclick="filterIncome('daily')" class="bg-blue-600 text-white px-4 py-1 rounded text-sm">Daily</button>
                <button onclick="filterIncome('weekly')" class="bg-blue-600 text-white px-4 py-1 rounded text-sm">Weekly</button>
                <button onclick="filterIncome('monthly')" class="bg-blue-600 text-white px-4 py-1 rounded text-sm">Monthly</button>
            </div>
            <p id="total-income" class="text-2xl font-bold">Total: रू. 0</p>
        </div>

        <!-- Form -->
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <input type="text" id="cust" placeholder="ग्राहकको नाम" class="w-full border p-2 mb-2 rounded">
            <select id="item-list" onchange="calc()" class="w-full border p-2 mb-2 rounded">
                <option value="Photocopy" data-price="10">Photocopy (रू. 10)</option>
                <option value="P.P Photo 6" data-price="150">P.P Photo 6 (रू. 150)</option>
                <option value="Nibedan" data-price="40">Nibedan (रू. 40)</option>
            </select>
            <input type="number" id="qty" value="1" oninput="calc()" class="w-full border p-2 mb-2 rounded" placeholder="Quantity">
            <input type="number" id="amt" readonly class="w-full border p-2 mb-2 rounded bg-gray-100">
            <select id="status" class="w-full border p-2 mb-4 rounded"><option value="Paid">Paid</option><option value="Due">उधार (Due)</option></select>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="newBill()" class="bg-gray-500 text-white py-2 rounded">New</button>
                <button onclick="saveBill()" class="bg-green-600 text-white py-2 rounded">Save</button>
                <button onclick="window.print()" class="bg-blue-600 text-white py-2 rounded">Print</button>
            </div>
        </div>

        <!-- Bill History -->
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="font-bold mb-4">📜 बिल इतिहास (History)</h2>
            <div id="history-list" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://kmceruxlxyjzisgklpdq.supabase.co", "sb_publishable_YoAUip8_m33tXwLQ5X-fnw_W4yNxSMg");
        
        document.getElementById('date-display').innerText = new Date().toDateString();

        async function fetchHistory() {
            const { data } = await _supabase.from('billing_entries').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('history-list');
            list.innerHTML = data.map(b => `
                <div class="border-b pb-2 flex justify-between items-center text-sm">
                    <div><span class="font-bold">${b.customer_name}</span> - ${b.item_name}</div>
                    <div class="font-bold text-blue-700">रू. ${b.bill_amount} (${b.status})</div>
                </div>
            `).join('');
        }

        async function saveBill() {
            await _supabase.from('billing_entries').insert([{
                customer_name: document.getElementById('cust').value,
                item_name: document.getElementById('item-list').value,
                bill_amount: document.getElementById('amt').value,
                status: document.getElementById('status').value
            }]);
            alert('Saved!');
            fetchHistory();
        }

        function calc() {
            const item = document.getElementById('item-list');
            document.getElementById('amt').value = item.options[item.selectedIndex].dataset.price * document.getElementById('qty').value;
        }

        function newBill() { location.reload(); }
        function logout() { localStorage.removeItem('isLoggedIn'); location.reload(); }
        
        // Load history on start
        fetchHistory();
        calc();
    </script>
</body>
</html>
